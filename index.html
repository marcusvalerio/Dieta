<html lang="pt-BR">

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dieta" />
  <meta name="theme-color" content="#0f1117" />

  <title>Plano Alimentar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #141820;
      --surface2: #1a2030;
      --border: #1e2740;
      --border2: #2a3050;
      --gold: #c9a84c;
      --gold-dim: #8a6e2a;
      --green: #6fbf8a;
      --green-dim: #2a4a35;
      --blue: #7eb8d4;
      --text: #ddd8cc;
      --text-dim: #7a8090;
      --text-faint: #3a4050;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(180deg, #141c2e 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 16px) 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    /* Progress ring */
    .ring-wrap {
      position: relative;
      width: 54px;
      height: 54px;
      flex-shrink: 0;
    }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border2); stroke-width: 3; }
    .ring-fill { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease, stroke 0.4s; }
    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 11px 0;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--safe-bottom) + 32px);
    }

    /* ── DAY PICKER ── */
    .day-picker {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      padding: 14px 16px 0;
    }
    .day-btn {
      padding: 7px 2px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .day-btn.selected {
      border-color: var(--gold);
      background: var(--surface2);
    }
    .day-name {
      font-family: 'DM Mono', monospace;
      font-size: 7px;
      letter-spacing: 0.5px;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .day-btn.selected .day-name { color: var(--gold); }
    .day-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold);
      margin: 0 auto 3px;
    }
    .day-prog {
      font-family: 'DM Mono', monospace;
      font-size: 7px;
      color: var(--text-faint);
    }
    .day-prog.done { color: var(--green); }
    .day-prog.partial { color: var(--gold); }

    /* ── MEAL CARDS ── */
    .meals-wrap { padding: 14px 16px; }

    .meal-card {
      margin-bottom: 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      transition: border-color 0.3s, background 0.3s;
    }
    .meal-card.complete {
      border-color: var(--green-dim);
      background: #0b1a10;
    }

    .meal-header {
      padding: 11px 16px 9px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .meal-card.complete .meal-header { border-bottom-color: #1a3525; }

    .meal-title {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: var(--gold);
    }
    .meal-card.complete .meal-title { color: var(--green); }

    .meal-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
    }
    .meal-card.complete .meal-count { color: var(--green); }

    /* ── FOOD ROWS ── */
    .food-row {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 9px 16px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .food-row:active { background: rgba(255,255,255,0.02); }
    .food-row.checked { background: rgba(111,191,138,0.03); }

    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--border2);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .checkbox.checked { border-color: var(--green); background: var(--green); }
    .checkbox.creatina { border-color: var(--blue); }
    .checkbox svg { display: none; }
    .checkbox.checked svg { display: block; }

    .food-name {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      transition: all 0.2s;
    }
    .food-row.checked .food-name { color: #3a5a45; text-decoration: line-through; }
    .food-name.creatina { color: var(--blue); font-style: italic; }
    .food-row.checked .food-name.creatina { color: #2a4a5a; }

    .food-qty {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
      flex-shrink: 0;
      margin-left: 6px;
    }
    .food-row.checked .food-qty { color: #2a3a30; }

    /* ── COMPLETE BANNER ── */
    .complete-banner {
      text-align: center;
      padding: 22px 20px;
      border-radius: 14px;
      border: 1px solid var(--green-dim);
      background: #0b1a10;
      margin-top: 4px;
    }
    .complete-banner .icon { font-size: 28px; margin-bottom: 8px; }
    .complete-banner .title { font-size: 16px; color: var(--green); margin-bottom: 4px; }
    .complete-banner .sub { font-family: 'DM Mono', monospace; font-size: 10px; color: #3a6a4a; }

    /* ── SHOPPING LIST ── */
    .shop-summary {
      margin: 14px 16px 12px;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .shop-summary-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }
    .shop-summary-count { font-size: 13px; color: var(--text); }
    .clear-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .shop-wrap { padding: 0 16px; }

    .shop-card {
      margin-bottom: 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      transition: border-color 0.3s, background 0.3s;
    }
    .shop-card.complete { border-color: var(--green-dim); background: #0b1a10; }

    .shop-header {
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .shop-card.complete .shop-header { border-bottom-color: #1a3525; }
    .shop-cat-name { font-size: 13px; letter-spacing: 0.5px; }
    .shop-cat-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-faint); }
    .shop-card.complete .shop-cat-count { color: var(--green); }

    .shop-row {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .shop-row:active { background: rgba(255,255,255,0.02); }
    .shop-row.checked { background: rgba(111,191,138,0.03); }

    .shop-info { flex: 1; }
    .shop-item-row { display: flex; align-items: center; justify-content: space-between; }
    .shop-item-name {
      font-size: 13px;
      color: var(--text);
      transition: all 0.2s;
    }
    .shop-row.checked .shop-item-name { color: #3a5a45; text-decoration: line-through; }
    .shop-item-qty {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
      flex-shrink: 0;
      margin-left: 6px;
    }
    .shop-row.checked .shop-item-qty { color: #2a3a30; }
    .shop-item-tip {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-faint);
      margin-top: 2px;
      transition: color 0.2s;
    }
    .shop-row.checked .shop-item-tip { color: #2a3530; }

    /* ── INSTALL BANNER ── */
    .install-banner {
      margin: 14px 16px 0;
      padding: 11px 14px;
      border-radius: 12px;
      background: #0e1825;
      border: 1px solid #1a3a5a;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--blue);
    }
    .install-banner .install-icon { font-size: 16px; flex-shrink: 0; }
    .install-banner span { line-height: 1.4; }
    .install-close {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      padding: 0 0 0 6px;
      flex-shrink: 0;
    }
  </style>
</head>

function getTodayIdx() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

let state = {
  tab: 'dieta',
  day: getTodayIdx(),
  checked: load('dieta_checked', {}),
  shopChecked: load('dieta_shop', {}),
  showInstall: !load('install_dismissed', false),
};

function setState(patch) {
  state = {...state, ...patch};
  if ('checked' in patch) save('dieta_checked', state.checked);
  if ('shopChecked' in patch) save('dieta_shop', state.shopChecked);
  if ('showInstall' in patch) save('install_dismissed', !state.showInstall);
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────

function getDayProgress(dayName) {
  const dayMeals = MEALS[dayName];
  let total = 0, done = 0;
  MEAL_ORDER.forEach(meal => {
    dayMeals[meal].forEach((_, i) => {
      total++;
      if (state.checked[`${dayName}__${meal}__${i}`]) done++;
    });
  });
  return total === 0 ? 0 : Math.round(done / total * 100);
}

function ring(pct, color) {
  const r = 23, circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return `
    <div class="ring-wrap">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle class="ring-bg" cx="27" cy="27" r="${r}"/>
        <circle class="ring-fill" cx="27" cy="27" r="${r}"
          stroke="${color}"
          stroke-dasharray="${circ}"
          stroke-dashoffset="${offset}"/>
      </svg>
      <div class="ring-label" style="color:${color}">${pct}%</div>
    </div>`;
}

function checkbox(checked, creatina) {
  const cls = ['checkbox', checked && 'checked', creatina && !checked && 'creatina'].filter(Boolean).join(' ');
  return `<div class="${cls}">
    <svg width="10" height="8" viewBox="0 0 11 9" fill="none">
      <path d="M1 4L4 7.5L10 1" stroke="#0f1117" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function renderDieta() {
  const day = DAYS[state.day];
  const meals = MEALS[day];
  const totalProg = getDayProgress(day);
  const ringColor = totalProg === 100 ? '#6fbf8a' : '#c9a84c';

  const isWeekend = day === 'Sábado' || day === 'Domingo';
  const titleDay = isWeekend ? day : `${day}-feira`;

  // Day picker
  const dayPicker = `
    <div class="day-picker">
      ${DAYS.map((d, i) => {
        const prog = getDayProgress(d);
        const sel = i === state.day;
        const isToday = i === getTodayIdx();
        return `<button class="day-btn${sel ? ' selected' : ''}" onclick="setDay(${i})">
          <div class="day-name">${d.slice(0,3)}</div>
          ${isToday ? '<div class="day-dot"></div>' : ''}
          <div class="day-prog${prog===100?' done':prog>0?' partial':''}">${prog===100?'✓':prog>0?prog+'%':'·'}</div>
        </button>`;
      }).join('')}
    </div>`;

  // Meal cards
  const mealCards = MEAL_ORDER.map(meal => {
    const items = meals[meal];
    const done = items.filter((_,i) => state.checked[`${day}__${meal}__${i}`]).length;
    const allDone = done === items.length;

    const rows = items.map((food, i) => {
      const key = `${day}__${meal}__${i}`;
      const isChecked = !!state.checked[key];
      const isCr = food.item === 'Creatina';
      return `<div class="food-row${isChecked?' checked':''}" onclick="toggleFood('${key}')">
        ${checkbox(isChecked, isCr)}
        <span class="food-name${isCr?' creatina':''}">${food.item}</span>
        <span class="food-qty">${food.qty}</span>
      </div>`;
    }).join('');

    return `<div class="meal-card${allDone?' complete':''}">
      <div class="meal-header">
        <div class="meal-title"><span>${MEAL_ICONS[meal]}</span>${meal}</div>
        <div class="meal-count">${done}/${items.length}</div>
      </div>
      ${rows}
    </div>`;
  }).join('');

  const banner = totalProg === 100 ? `
    <div class="complete-banner">
      <div class="icon">🏆</div>
      <div class="title">Dieta completa hoje!</div>
      <div class="sub">CONSISTÊNCIA É A CHAVE · CONTINUE AMANHÃ</div>
    </div>` : '';

  return `
    <div class="header">
      <div style="max-width:480px;margin:0 auto">
        <div class="header-top">
          <div>
            <div class="header-label">Plano Alimentar</div>
            <div class="header-title">${titleDay}</div>
          </div>
          ${ring(totalProg, ringColor)}
        </div>
        <div class="tabs">
          <button class="tab-btn active" onclick="setTab('dieta')">🍽️&nbsp; Dieta</button>
          <button class="tab-btn" onclick="setTab('compras')">🛒&nbsp; Compras</button>
        </div>
      </div>
    </div>
    <div class="scroll-area">
      ${state.showInstall ? renderInstallBanner() : ''}
      ${dayPicker}
      <div class="meals-wrap">${mealCards}${banner}</div>
    </div>`;
}

function renderCompras() {
  const total = SHOPPING.reduce((a,c) => a + c.items.length, 0);
  const done = Object.values(state.shopChecked).filter(Boolean).length;
  const pct = Math.round(done / total * 100);

  const cards = SHOPPING.map((cat, ci) => {
    const catDone = cat.items.filter((_,i) => state.shopChecked[`${ci}_${i}`]).length;
    const allDone = catDone === cat.items.length;

    const rows = cat.items.map((food, ii) => {
      const key = `${ci}_${ii}`;
      const isChecked = !!state.shopChecked[key];
      return `<div class="shop-row${isChecked?' checked':''}" onclick="toggleShop('${key}')">
        ${checkbox(isChecked, false)}
        <div class="shop-info">
          <div class="shop-item-row">
            <span class="shop-item-name">${food.item}</span>
            <span class="shop-item-qty">${food.qty}</span>
          </div>
          ${food.tip ? `<div class="shop-item-tip">${food.tip}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    return `<div class="shop-card${allDone?' complete':''}">
      <div class="shop-header">
        <span class="shop-cat-name" style="color:${allDone?'#6fbf8a':cat.color}">${cat.cat}</span>
        <span class="shop-cat-count">${catDone}/${cat.items.length}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');

  const banner = done === total ? `
    <div class="complete-banner" style="margin:4px 0 0">
      <div class="icon">🛒</div>
      <div class="title">Compras completas!</div>
      <div class="sub">SEMANA GARANTIDA · AGORA É SÓ EXECUTAR</div>
    </div>` : '';

  return `
    <div class="header">
      <div style="max-width:480px;margin:0 auto">
        <div class="header-top">
          <div>
            <div class="header-label">Plano Alimentar</div>
            <div class="header-title">Lista de Compras</div>
          </div>
          ${ring(pct, '#7eb8d4')}
        </div>
        <div class="tabs">
          <button class="tab-btn" onclick="setTab('dieta')">🍽️&nbsp; Dieta</button>
          <button class="tab-btn active" onclick="setTab('compras')">🛒&nbsp; Compras</button>
        </div>
      </div>
    </div>
    <div class="scroll-area">
      <div class="shop-summary">
        <div>
          <div class="shop-summary-label">SEMANA COMPLETA</div>
          <div class="shop-summary-count">${done} de ${total} itens marcados</div>
        </div>
        <button class="clear-btn" onclick="clearShop()">Limpar</button>
      </div>
      <div class="shop-wrap">${cards}${banner}</div>
    </div>`;
}

function renderInstallBanner() {
  return `<div class="install-banner">
    <span class="install-icon">📲</span>
    <span>Adicione à tela inicial: toque em <strong>Compartilhar</strong> → <strong>Adicionar à Tela de Início</strong></span>
    <button class="install-close" onclick="dismissInstall()">×</button>
  </div>`;
}

function render() {
  document.getElementById('app').innerHTML =
    state.tab === 'dieta' ? renderDieta() : renderCompras();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────

window.setTab = (t) => setState({tab: t});
window.setDay = (i) => setState({day: i});

window.toggleFood = (key) => {
  const c = {...state.checked};
  c[key] = !c[key];
  setState({checked: c});
};

window.toggleShop = (key) => {
  const c = {...state.shopChecked};
  c[key] = !c[key];
  setState({shopChecked: c});
};

window.clearShop = () => setState({shopChecked: {}});
window.dismissInstall = () => setState({showInstall: false});

// ── INIT ──────────────────────────────────────────────────────────────────────

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
